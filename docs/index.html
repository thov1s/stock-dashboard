<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>美股盯盘日报</title>
<style>
:root {
  --bg: #f4f8fb;
  --bg-warm: #fff8ec;
  --panel: #ffffff;
  --panel-soft: rgba(255, 255, 255, .78);
  --panel2: #edf6f9;
  --line: #d7e5ea;
  --text: #17313a;
  --muted: #5b7077;
  --subtle: #7d9097;
  --gain: #1677a3;
  --loss: #c9771b;
  --warn: #a85f00;
  --blue: #1677a3;
  --teal: #0f9f8f;
  --purple: #6d5bd0;
  --sun: #f2b84b;
  --tiger: #eaf7ff;
  --hsbc: #fff2df;
  --tiger-line: #1677a3;
  --hsbc-line: #c9771b;
  --shadow: 0 18px 45px rgba(33, 91, 104, .10);
  --shadow-soft: 0 8px 24px rgba(33, 91, 104, .08);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: linear-gradient(180deg, #fbfaf6 0%, var(--bg) 40%, #f7fafc 100%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
  line-height: 1.48;
}
.lock {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #f8fcff, #fdf9f0);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.lock-box {
  width: min(320px, calc(100vw - 40px));
  text-align: center;
  background: rgba(255,255,255,.82);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 28px 24px;
  backdrop-filter: blur(18px);
}
.lock-title {
  color: var(--muted);
  font-size: 13px;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.lock input {
  width: 100%;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--text);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 15px;
  text-align: center;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.65);
}
.lock input:focus { border-color: var(--teal); box-shadow: 0 0 0 4px rgba(15,159,143,.14); }
.lock-error { min-height: 18px; margin-top: 10px; color: var(--loss); font-size: 13px; }
.app { display: none; max-width: 1220px; margin: 0 auto; padding: 24px 18px 64px; }
header {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: flex-end;
  padding: 28px;
  margin-bottom: 18px;
  border: 1px solid rgba(255,255,255,.78);
  border-radius: 28px;
  background: linear-gradient(135deg, rgba(255,255,255,.95), rgba(236,249,248,.9));
  box-shadow: var(--shadow);
  overflow: hidden;
  position: relative;
}
.eyebrow { color: var(--teal); font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 750; }
h1 { margin: 5px 0 0; font-size: clamp(28px, 5vw, 44px); line-height: 1.08; letter-spacing: 0; }
.date { color: var(--muted); font-size: 14px; margin-top: 6px; }
.source {
  color: var(--muted);
  font-size: 12px;
  text-align: right;
  background: rgba(255,255,255,.62);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 999px;
  padding: 8px 12px;
}
.metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 18px; }
.period-card {
  background: linear-gradient(135deg, #ffffff, #f1fbfa);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 18px 20px;
  margin-bottom: 18px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: center;
  box-shadow: var(--shadow-soft);
}
.period-title { color: var(--muted); font-size: 12px; margin-bottom: 6px; font-weight: 700; }
.period-value { font-size: clamp(24px, 5vw, 34px); font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 0; }
.period-sub { color: var(--subtle); font-size: 12px; margin-top: 4px; }
.range-tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
.range-tabs button {
  color: var(--muted);
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 13px;
  cursor: pointer;
  font-weight: 700;
}
.range-tabs button.active { color: #083b49; border-color: rgba(15,159,143,.42); background: #dff7f2; }
.metric, .card, section {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 22px;
  box-shadow: var(--shadow-soft);
}
.metric {
  padding: 16px;
  background: linear-gradient(180deg, #ffffff, #f7fbfd);
}
.label { color: var(--muted); font-size: 12px; margin-bottom: 6px; font-weight: 700; }
.value { font-variant-numeric: tabular-nums; font-size: clamp(20px, 3.4vw, 27px); font-weight: 800; letter-spacing: 0; }
.hint { color: var(--subtle); font-size: 12px; margin-top: 4px; }
.up { color: var(--gain); }
.down { color: var(--loss); }
.neutral { color: var(--muted); }
section { margin-bottom: 18px; overflow: hidden; }
.section-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, #ffffff, #f7fbfd);
}
.section-actions {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
h2 { margin: 0; font-size: 17px; letter-spacing: 0; }
.table-wrap { overflow-x: auto; }
.table-wrap.hidden { display: none; }
table { width: 100%; border-collapse: collapse; min-width: 760px; }
th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: right; font-size: 13px; font-variant-numeric: tabular-nums; }
th:first-child, td:first-child { text-align: left; }
th { color: var(--muted); font-weight: 800; background: #f3f8fa; position: sticky; top: 0; }
th.sortable {
  cursor: pointer;
  user-select: none;
  color: var(--text);
}
th.sortable::after {
  content: " ↕";
  color: var(--subtle);
  font-size: 11px;
}
th.sortable.asc::after { content: " ↑"; color: var(--blue); }
th.sortable.desc::after { content: " ↓"; color: var(--blue); }
tr:last-child td { border-bottom: 0; }
.sub td { color: var(--muted); background: var(--panel2); }
.sub td:first-child { border-left: 4px solid transparent; }
.sub.broker-tiger td { background: var(--tiger); }
.sub.broker-hsbc td { background: var(--hsbc); }
.sub.broker-tiger td:first-child { border-left-color: var(--tiger-line); }
.sub.broker-hsbc td:first-child { border-left-color: var(--hsbc-line); }
.broker-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 999px;
  margin-right: 6px;
  vertical-align: 1px;
}
.broker-dot.tiger { background: var(--tiger-line); }
.broker-dot.hsbc { background: var(--hsbc-line); }
.ticker { font-weight: 700; letter-spacing: .02em; }
.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12px;
  white-space: nowrap;
  background: #eef7f8;
  color: var(--muted);
  font-weight: 750;
}
.pill.good { background: #dff3fb; color: var(--gain); }
.pill.bad { background: #fff0d8; color: var(--loss); }
.pill.watch { background: #fff7ed; color: var(--warn); border: 1px solid #fed7aa; }
.sector-block { padding: 10px 12px; background: rgba(255,255,255,.82); border: 1px solid var(--line); border-radius: 14px; margin-top: 8px; }
.sector-tickers { font-family: inherit; font-weight: 750; color: var(--blue); font-size: 12px; letter-spacing: .04em; margin-bottom: 6px; }
.intel-muted { color: var(--subtle); font-style: italic; }
.bar {
  height: 7px;
  background: #dce9ee;
  border-radius: 999px;
  overflow: hidden;
  min-width: 90px;
}
.bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--teal), var(--blue)); border-radius: 999px; }
.bar > span.good { background: var(--gain); }
.bar > span.bad { background: var(--loss); }
.level-axis {
  position: relative;
  height: 46px;
  min-width: 220px;
  padding-top: 19px;
}
.level-axis::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 23px;
  height: 2px;
  background: var(--line);
}
.axis-marker {
  position: absolute;
  top: 8px;
  width: 2px;
  height: 30px;
  background: var(--muted);
}
.axis-marker.current { background: var(--blue); height: 36px; top: 5px; }
.axis-marker.open { background: var(--loss); border-left: 2px dashed var(--loss); }
.axis-marker.add { background: var(--purple); border-left: 2px dotted var(--purple); }
.axis-label {
  position: absolute;
  top: 35px;
  transform: translateX(-50%);
  color: var(--subtle);
  font-size: 10px;
  white-space: nowrap;
}
.grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; padding: 16px 18px 18px; }
.note, .news {
  background: linear-gradient(180deg, #ffffff, #f5fbfc);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 13px 14px;
}
.news .ticker { color: var(--blue); margin-bottom: 5px; }
.note { color: var(--muted); font-size: 13px; }
.intel-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  padding: 16px 18px 18px;
}
.intel-card {
  background: linear-gradient(180deg, #ffffff, #f5fbfc);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
}
.intel-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}
.intel-price { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
.intel-line { margin-top: 7px; color: var(--muted); font-size: 13px; }
.intel-line b { color: var(--text); }
.intel-source {
  display: inline-flex;
  margin-top: 10px;
  font-size: 12px;
  color: var(--blue);
  text-decoration: none;
}
.intel-source:hover { text-decoration: underline; }
.intel-summary {
  margin: 16px 18px 0;
  background: linear-gradient(135deg, #ffffff, #ecfaf6);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 15px 16px;
}
.overview-title {
  font-weight: 700;
  margin-bottom: 8px;
}
.overview-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-top: 10px;
}
.overview-box {
  background: rgba(255,255,255,.82);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px;
}
.overview-label { color: var(--muted); font-size: 12px; margin-bottom: 6px; font-weight: 650; }
.overview-list {
  margin: 0;
  padding-left: 16px;
  color: var(--muted);
  font-size: 13px;
}
.overview-list li { margin: 5px 0; }
.news-strip {
  margin-top: 12px;
  display: grid;
  gap: 8px;
}
.news-item {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 8px 10px;
  align-items: start;
  background: rgba(255,255,255,.9);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 10px 12px;
}
.news-title {
  color: var(--text);
  font-weight: 650;
  text-decoration: none;
}
.news-title:hover { text-decoration: underline; }
.news-meta {
  color: var(--subtle);
  font-size: 12px;
  margin-top: 3px;
}
.news-impact {
  color: var(--muted);
  font-size: 12px;
  margin-top: 4px;
}
.pill.positive { background: #dff3fb; color: var(--gain); border: 1px solid #bfe7f2; }
.pill.negative { background: #ffedd5; color: var(--loss); border: 1px solid #fed7aa; }
.pill.buy { background: #dff3fb; color: var(--gain); border: 1px solid #bfe7f2; }
.pill.hold { background: #e7f8f2; color: #0b7c70; border: 1px solid #bceee2; }
.pill.risk { background: #ffedd5; color: var(--loss); border: 1px solid #fed7aa; }
.pill.neutral { background: var(--panel); color: var(--muted); border: 1px solid var(--line); }
.search {
  width: min(260px, 100%);
  background: #ffffff;
  border: 1px solid var(--line);
  color: var(--text);
  border-radius: 999px;
  padding: 9px 13px;
  outline: none;
}
.search:focus { border-color: var(--teal); box-shadow: 0 0 0 4px rgba(15,159,143,.12); }
.cat { padding: 14px 16px; border-top: 1px solid var(--line); }
.cat:first-child { border-top: 0; }
.cat-title { color: var(--muted); font-size: 13px; margin-bottom: 10px; font-weight: 650; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  background: #f6fbfc;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}
footer { color: var(--subtle); font-size: 12px; padding-top: 8px; }
.expand-btn {
  border: 1px solid var(--line);
  background: #ffffff;
  color: var(--text);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  font-weight: 750;
}
.expand-btn:hover { border-color: var(--teal); color: var(--blue); background: #effbf8; }
.broker-detail-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
}
@media (max-width: 760px) {
  .app { padding: 12px 10px 42px; }
  header { display: block; padding: 22px 18px; border-radius: 24px; }
  .source { text-align: left; margin-top: 10px; }
  .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .metric { padding: 14px; border-radius: 18px; }
  .period-card { grid-template-columns: 1fr; }
  .range-tabs { justify-content: flex-start; }
  .grid { grid-template-columns: 1fr; }
  .intel-grid { grid-template-columns: 1fr; }
  .overview-grid { grid-template-columns: 1fr; }
  .value { font-size: 20px; }
  .section-head { align-items: flex-start; flex-direction: column; padding: 14px; }
  .section-actions { justify-content: flex-start; }
  .search { width: 100%; }
  section { border-radius: 20px; }
  th, td { padding: 10px 11px; }
  .level-axis { min-width: 190px; }
}
@media (max-width: 430px) {
  .metrics { grid-template-columns: 1fr; }
  h1 { font-size: 30px; }
  .period-value { font-size: 26px; }
  .range-tabs button { flex: 1 1 calc(50% - 8px); }
  .lock-box { width: calc(100vw - 28px); }
}
</style>
</head>

const PASSWORD_HASH = "d9ae582cd636222dc0fa16b21aa28174fa351419ed81cf311a637cd7830f3788";
async function sha256(text) {
  const bytes = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(bytes)).map(b => b.toString(16).padStart(2, "0")).join("");
}
function fmt(n, d = 2) {
  if (n === null || n === undefined || Number.isNaN(Number(n))) return "—";
  return Number(n).toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
}
function sign(n) { return Number(n) > 0 ? "+" : ""; }
function cls(n) { return Number(n) > 0 ? "up" : Number(n) < 0 ? "down" : "neutral"; }
function money(n) { return n === null || n === undefined ? "—" : `${sign(n)}$${fmt(n)}`; }
function pct(n) { return n === null || n === undefined ? "—" : `${sign(n)}${fmt(n)}%`; }
function pctWidth(n) {
  if (n === null || n === undefined) return 0;
  return Math.max(4, Math.min(100, Math.abs(Number(n))));
}
function brokerClass(name) {
  return String(name).includes("汇丰") ? "broker-hsbc" : "broker-tiger";
}
function brokerDot(name) {
  const kind = String(name).includes("汇丰") ? "hsbc" : "tiger";
  return `<span class="broker-dot ${kind}"></span>${name}`;
}
function clampPct(n) {
  return Math.max(2, Math.min(98, Number(n)));
}
function levelAxis(w) {
  if (w.last_price === null || w.last_price === undefined) return "—";
  const points = [w.last_price, w.open_price];
  if (w.add_price !== null && w.add_price !== undefined) points.push(w.add_price);
  const min = Math.min(...points);
  const max = Math.max(...points);
  const padding = Math.max((max - min) * 0.18, max * 0.015, 0.5);
  const low = min - padding;
  const high = max + padding;
  const pos = value => clampPct(((value - low) / (high - low)) * 100);
  const markers = [
    `<span class="axis-marker current" style="left:${pos(w.last_price)}%"></span><span class="axis-label" style="left:${pos(w.last_price)}%">现价</span>`,
    `<span class="axis-marker open" style="left:${pos(w.open_price)}%"></span><span class="axis-label" style="left:${pos(w.open_price)}%">开仓</span>`
  ];
  if (w.add_price !== null && w.add_price !== undefined) {
    markers.push(`<span class="axis-marker add" style="left:${pos(w.add_price)}%"></span><span class="axis-label" style="left:${pos(w.add_price)}%">加仓</span>`);
  }
  return `<div class="level-axis">${markers.join("")}</div>`;
}
function unlock() {
  document.getElementById("lock").remove();
  document.getElementById("app").style.display = "block";
  render();
}

  document.getElementById("password").addEventListener("keydown", async (event) => {
    if (event.key !== "Enter") return;
    const hash = await sha256(event.target.value);
    if (hash === PASSWORD_HASH) {
      sessionStorage.setItem("stock-monitor-unlocked", hash);

      document.getElementById("lock-error").textContent = "密码不对";
      event.target.value = "";

}
function table(headers, rows) {
  return `<thead><tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.join("")}</tbody>`;
}
let positionSort = { key: "market_weight_pct", direction: "desc" };
const expandedPositions = new Set();
let sourcesVisible = false;
const positionSortLabels = {
  total_shares: "股数",
  avg_cost: "平均成本",
  last_price: "现价",
  market_value: "市值",
  total_pnl: "总盈亏",
  total_pnl_pct: "盈亏%",
  market_weight_pct: "市值占比"
};
function numValue(value) {
  return value === null || value === undefined || Number.isNaN(Number(value)) ? null : Number(value);
}
function sortPositions() {
  return [...REPORT.positions].sort((a, b) => {
    const av = numValue(a[positionSort.key]);
    const bv = numValue(b[positionSort.key]);
    if (av === null && bv === null) return a.ticker.localeCompare(b.ticker);
    if (av === null) return 1;
    if (bv === null) return -1;
    const diff = av - bv;
    if (diff === 0) return a.ticker.localeCompare(b.ticker);
    return positionSort.direction === "asc" ? diff : -diff;
  });
}
function sortablePositionHead(key) {
  const active = positionSort.key === key ? positionSort.direction : "";
  return `<th class="sortable ${active}" data-position-sort="${key}" title="点击切换排序">${positionSortLabels[key]}</th>`;
}
function renderPositionTable() {
  const positionRows = [];
  sortPositions().forEach(item => {
    const canExpand = item.rows.length > 1;
    const isExpanded = expandedPositions.has(item.ticker);
    const action = canExpand ? `<button class="expand-btn" type="button" data-expand="${item.ticker}">${isExpanded ? "收起" : "展开"}</button>` : "";
    positionRows.push(`<tr><td><span class="ticker">${item.ticker}</span></td><td>${fmt(item.total_shares, 0)}</td><td>${fmt(item.avg_cost)}</td><td>${fmt(item.last_price)}</td><td>$${fmt(item.market_value)}</td><td class="${cls(item.total_pnl)}">${money(item.total_pnl)}</td><td class="${cls(item.total_pnl_pct)}">${pct(item.total_pnl_pct)}</td><td><div class="bar"><span style="width:${pctWidth(item.market_weight_pct)}%"></span></div></td><td>${action}</td></tr>`);
    if (isExpanded) {
      item.rows.forEach(row => {
        const rowMarketValue = item.last_price === null || item.last_price === undefined ? null : row.shares * item.last_price;
        positionRows.push(`<tr class="sub ${brokerClass(row.platform)}"><td><span class="broker-detail-label">${brokerDot(row.platform)}</span></td><td>${fmt(row.shares, 0)}</td><td>${fmt(row.buy_price)}</td><td>${fmt(item.last_price)}</td><td>$${fmt(rowMarketValue)}</td><td class="${cls(row.pnl)}">${money(row.pnl)}</td><td class="${cls(row.pnl_pct)}">${pct(row.pnl_pct)}</td><td></td><td></td></tr>`);
      });
    }
  });
  document.getElementById("positions").innerHTML = `<thead><tr><th>标的</th>${sortablePositionHead("total_shares")}${sortablePositionHead("avg_cost")}${sortablePositionHead("last_price")}${sortablePositionHead("market_value")}${sortablePositionHead("total_pnl")}${sortablePositionHead("total_pnl_pct")}${sortablePositionHead("market_weight_pct")}<th>操作</th></tr></thead><tbody>${positionRows.join("")}</tbody>`;
  document.querySelectorAll("[data-position-sort]").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.positionSort;
      if (positionSort.key === key) {
        positionSort.direction = positionSort.direction === "desc" ? "asc" : "desc";
      } else {
        positionSort = { key, direction: "desc" };
      }
      renderPositionTable();
    });
  });
  document.querySelectorAll("[data-expand]").forEach(button => {
    button.addEventListener("click", () => {
      const ticker = button.dataset.expand;
      if (expandedPositions.has(ticker)) {
        expandedPositions.delete(ticker);
      } else {
        expandedPositions.add(ticker);
      }
      renderPositionTable();
    });
  });
}

  const majorNews = (intel.major_news || {}).portfolio_news_summary || [];
  const newsList = majorNews.length ? majorNews.map(item => (
    `<div class="news-item">
      <span class="pill ${item.tone_class}">${item.ticker} · ${item.tone}</span>
      <div>
        <a class="news-title" href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a>

  document.getElementById("intel-summary").innerHTML = `

    </div>
    <div class="intel-line">${intel.summary || ""}</div>
  `;

  // 中性化的价位状态映射：不用"买入/试仓/暂不补仓"这类操作建议式措辞，
  // 只客观描述现价相对你记录的开仓/加仓价的位置
  const STATUS_MAP = {

  };

  const cards = intel.cards || [];

      <a class="intel-source" href="${item.source_url}" target="_blank" rel="noopener noreferrer">${item.source_label}</a>
