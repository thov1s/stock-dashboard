<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股盯盘日报</title>
<style>
:root {
  --bg: #f4f8fb;
  --bg-warm: #fff8ec;
  --panel: #ffffff;
  --panel-soft: rgba(255, 255, 255, .78);
  --panel2: #edf6f9;
  --line: #d7e5ea;
  --text: #17313a;
  --muted: #5b7077;
  --subtle: #7d9097;
  --gain: #1677a3;
  --loss: #c9771b;
  --warn: #a85f00;
  --blue: #1677a3;
  --teal: #0f9f8f;
  --purple: #6d5bd0;
  --sun: #f2b84b;
  --tiger: #eaf7ff;
  --hsbc: #fff2df;
  --tiger-line: #1677a3;
  --hsbc-line: #c9771b;
  --shadow: 0 18px 45px rgba(33, 91, 104, .10);
  --shadow-soft: 0 8px 24px rgba(33, 91, 104, .08);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: linear-gradient(180deg, #fbfaf6 0%, var(--bg) 40%, #f7fafc 100%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
  line-height: 1.48;
}
.lock {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #f8fcff, #fdf9f0);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.lock-box {
  width: min(320px, calc(100vw - 40px));
  text-align: center;
  background: rgba(255,255,255,.82);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 28px 24px;
  backdrop-filter: blur(18px);
}
.lock-title {
  color: var(--muted);
  font-size: 13px;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.lock input {
  width: 100%;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--text);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 15px;
  text-align: center;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.65);
}
.lock input:focus { border-color: var(--teal); box-shadow: 0 0 0 4px rgba(15,159,143,.14); }
.lock-error { min-height: 18px; margin-top: 10px; color: var(--loss); font-size: 13px; }
.app { display: none; max-width: 1220px; margin: 0 auto; padding: 24px 18px 64px; }
header {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: flex-end;
  padding: 28px;
  margin-bottom: 18px;
  border: 1px solid rgba(255,255,255,.78);
  border-radius: 28px;
  background: linear-gradient(135deg, rgba(255,255,255,.95), rgba(236,249,248,.9));
  box-shadow: var(--shadow);
  overflow: hidden;
  position: relative;
}
.eyebrow { color: var(--teal); font-size: 12px; letter-spacing: .1em; text-transform: uppercase; font-weight: 750; }
h1 { margin: 5px 0 0; font-size: clamp(28px, 5vw, 44px); line-height: 1.08; letter-spacing: 0; }
.date { color: var(--muted); font-size: 14px; margin-top: 6px; }
.source {
  color: var(--muted);
  font-size: 12px;
  text-align: right;
  background: rgba(255,255,255,.62);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 999px;
  padding: 8px 12px;
}
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 18px; }
.period-card {
  background: linear-gradient(135deg, #ffffff, #f1fbfa);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 18px 20px;
  margin-bottom: 18px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: center;
  box-shadow: var(--shadow-soft);
}
.period-title { color: var(--muted); font-size: 12px; margin-bottom: 6px; font-weight: 700; }
.period-value { font-size: clamp(24px, 5vw, 34px); font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 0; }
.period-sub { color: var(--subtle); font-size: 12px; margin-top: 4px; }
.range-tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
.range-tabs button {
  color: var(--muted);
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 13px;
  cursor: pointer;
  font-weight: 700;
}
.range-tabs button.active { color: #083b49; border-color: rgba(15,159,143,.42); background: #dff7f2; }
.metric, .card, section {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 22px;
  box-shadow: var(--shadow-soft);
}
.metric {
  padding: 16px;
  background: linear-gradient(180deg, #ffffff, #f7fbfd);
}
.label { color: var(--muted); font-size: 12px; margin-bottom: 6px; font-weight: 700; }
.value { font-variant-numeric: tabular-nums; font-size: clamp(20px, 3.4vw, 27px); font-weight: 800; letter-spacing: 0; }
.hint { color: var(--subtle); font-size: 12px; margin-top: 4px; }
.up { color: var(--gain); }
.down { color: var(--loss); }
.neutral { color: var(--muted); }
section { margin-bottom: 18px; overflow: hidden; }
.section-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, #ffffff, #f7fbfd);
}
.section-actions {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
h2 { margin: 0; font-size: 17px; letter-spacing: 0; }
.table-wrap { overflow-x: auto; }
.table-wrap.hidden { display: none; }
table.hide-notes th:last-child, table.hide-notes td:last-child { display: none; }
table { width: 100%; border-collapse: collapse; min-width: 760px; }
th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: right; font-size: 13px; font-variant-numeric: tabular-nums; }
th:first-child, td:first-child { text-align: left; }
th { color: var(--muted); font-weight: 800; background: #f3f8fa; position: sticky; top: 0; }
th.sortable {
  cursor: pointer;
  user-select: none;
  color: var(--text);
}
th.sortable::after {
  content: " ↕";
  color: var(--subtle);
  font-size: 11px;
}
th.sortable.asc::after { content: " ↑"; color: var(--blue); }
th.sortable.desc::after { content: " ↓"; color: var(--blue); }
tr:last-child td { border-bottom: 0; }
.sub td { color: var(--muted); background: var(--panel2); }
.sub td:first-child { border-left: 4px solid transparent; }
.sub.broker-tiger td { background: var(--tiger); }
.sub.broker-hsbc td { background: var(--hsbc); }
.sub.broker-tiger td:first-child { border-left-color: var(--tiger-line); }
.sub.broker-hsbc td:first-child { border-left-color: var(--hsbc-line); }
.broker-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 999px;
  margin-right: 6px;
  vertical-align: 1px;
}
.broker-dot.tiger { background: var(--tiger-line); }
.broker-dot.hsbc { background: var(--hsbc-line); }
.ticker { font-weight: 700; letter-spacing: .02em; }
.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12px;
  white-space: nowrap;
  background: #eef7f8;
  color: var(--muted);
  font-weight: 750;
}
.pill.good { background: #dff3fb; color: var(--gain); }
.pill.bad { background: #fff0d8; color: var(--loss); }
.pill.watch { background: #fff7ed; color: var(--warn); border: 1px solid #fed7aa; }
.sector-block { padding: 10px 12px; background: rgba(255,255,255,.82); border: 1px solid var(--line); border-radius: 14px; margin-top: 8px; }
.sector-tickers { font-family: inherit; font-weight: 750; color: var(--blue); font-size: 12px; letter-spacing: .04em; margin-bottom: 6px; }
.intel-muted { color: var(--subtle); font-style: italic; }
.bar {
  height: 7px;
  background: #dce9ee;
  border-radius: 999px;
  overflow: hidden;
  min-width: 90px;
}
.bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--teal), var(--blue)); border-radius: 999px; }
.bar > span.good { background: var(--gain); }
.bar > span.bad { background: var(--loss); }

/* 今日盈亏归因 */
.attr-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; }
.attr-row .attr-ticker { width: 56px; font-weight: 750; flex-shrink: 0; }
.attr-row .attr-bar-wrap { flex: 1; height: 16px; background: #eef2f4; border-radius: 6px; position: relative; overflow: hidden; }
.attr-row .attr-bar-fill { position: absolute; top: 0; bottom: 0; border-radius: 6px; }
.attr-row .attr-bar-fill.good { background: var(--gain); right: 50%; }
.attr-row .attr-bar-fill.bad { background: var(--loss); left: 50%; }
.attr-row .attr-value { width: 84px; text-align: right; flex-shrink: 0; font-weight: 700; }
.attr-empty { color: var(--subtle); font-size: 13px; padding: 4px 0; }

/* 事件日历 */
.cal-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
.cal-item:last-child { border-bottom: none; }
.cal-date { width: 78px; flex-shrink: 0; font-family: inherit; font-weight: 750; color: var(--blue); font-size: 12px; }
.cal-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-right: 8px; font-weight: 700; }
.cal-tag.earnings { background: #eef7f8; color: var(--teal); }
.cal-tag.macro { background: #fff7ed; color: var(--warn); }
.cal-empty { color: var(--subtle); font-size: 13px; }
.cal-item.highlight { background: #dff7f2; border-radius: 10px; }

/* 事件日历 - 月历网格 */
.cal-months { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 14px; }
.cal-month { flex: 1 1 260px; min-width: 230px; }
.cal-month-title { font-weight: 750; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-weekday { text-align: center; font-size: 10px; color: var(--subtle); font-weight: 700; padding-bottom: 4px; }
.cal-day { position: relative; aspect-ratio: 1; border: 1px solid var(--line); border-radius: 8px; padding: 3px; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
.cal-day.empty { border-color: transparent; background: transparent; }
.cal-day.today { border-color: var(--blue); border-width: 2px; }
.cal-day-num { font-weight: 700; color: var(--text); font-size: 10px; line-height: 1; }
.cal-day.today .cal-day-num { color: var(--blue); }
.cal-day.has-event { cursor: pointer; }
.cal-day.has-event:hover { border-color: var(--teal); }
.cal-day-tags { display: flex; flex-direction: column; gap: 1px; margin-top: 2px; overflow: hidden; }
.cal-day-tag { font-size: 8px; padding: 1px 3px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
.cal-day-tag.earnings { background: #eef7f8; color: var(--teal); }
.cal-day-tag.macro { background: #fff7ed; color: var(--warn); }
.cal-day-more { font-size: 8px; color: var(--subtle); }

/* sparkline + 技术指标徽章 */
.spark-wrap { display: flex; align-items: center; gap: 6px; }
.tech-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 6px; margin-left: 4px; font-weight: 700; }
.tech-badge.above { background: #dff3fb; color: var(--gain); }
.tech-badge.below { background: #fff0d8; color: var(--loss); }
.tech-badge.near-high { background: #eef7f8; color: var(--teal); }
.tech-badge.near-low { background: #fff0d8; color: var(--loss); }

/* 新闻分层 */
.news-tier-label { font-size: 11px; font-weight: 750; color: var(--subtle); text-transform: uppercase; letter-spacing: .05em; margin: 10px 0 4px; }
.level-axis {
  position: relative;
  height: 46px;
  min-width: 220px;
  padding-top: 19px;
}
.level-axis::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 23px;
  height: 2px;
  background: var(--line);
}
.axis-marker {
  position: absolute;
  top: 8px;
  width: 2px;
  height: 30px;
  background: var(--muted);
}
.axis-marker.current { background: var(--blue); height: 36px; top: 5px; }
.axis-marker.open { background: var(--loss); border-left: 2px dashed var(--loss); }
.axis-marker.add { background: var(--purple); border-left: 2px dotted var(--purple); }
.axis-marker.stop { background: var(--loss); border-left: 2px solid var(--loss); }
.axis-label {
  position: absolute;
  top: 35px;
  transform: translateX(-50%);
  color: var(--subtle);
  font-size: 10px;
  white-space: nowrap;
}
.grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; padding: 16px 18px 18px; }
.note, .news {
  background: linear-gradient(180deg, #ffffff, #f5fbfc);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 13px 14px;
}
.news .ticker { color: var(--blue); margin-bottom: 5px; }
.note { color: var(--muted); font-size: 13px; }
.intel-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  padding: 16px 18px 18px;
}
.intel-card {
  background: linear-gradient(180deg, #ffffff, #f5fbfc);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
}
.intel-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}
.intel-price { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
.intel-line { margin-top: 7px; color: var(--muted); font-size: 13px; }
.intel-line b { color: var(--text); }
.intel-source {
  display: inline-flex;
  margin-top: 10px;
  font-size: 12px;
  color: var(--blue);
  text-decoration: none;
}
.intel-source:hover { text-decoration: underline; }
.intel-summary {
  margin: 16px 18px 0;
  background: linear-gradient(135deg, #ffffff, #ecfaf6);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 15px 16px;
}
.overview-title {
  font-weight: 700;
  margin-bottom: 8px;
}
.overview-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-top: 10px;
}
.overview-box {
  background: rgba(255,255,255,.82);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px;
}
.overview-label { color: var(--muted); font-size: 12px; margin-bottom: 6px; font-weight: 650; }
.overview-list {
  margin: 0;
  padding-left: 16px;
  color: var(--muted);
  font-size: 13px;
}
.overview-list li { margin: 5px 0; }
.conc-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
.conc-ticker { width: 96px; flex-shrink: 0; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conc-bar-wrap { flex: 1; height: 8px; background: #eef2f4; border-radius: 4px; overflow: hidden; }
.conc-bar-fill { height: 100%; background: var(--blue); border-radius: 4px; }
.conc-bar-fill.cat { background: var(--purple); }
.conc-value { width: 48px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; color: var(--muted); }
.news-strip {
  margin-top: 12px;
  display: grid;
  gap: 8px;
}
.news-item {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 8px 10px;
  align-items: start;
  background: rgba(255,255,255,.9);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 10px 12px;
}
.news-title {
  color: var(--text);
  font-weight: 650;
  text-decoration: none;
}
.news-title:hover { text-decoration: underline; }
.news-meta {
  color: var(--subtle);
  font-size: 12px;
  margin-top: 3px;
}
.news-impact {
  color: var(--muted);
  font-size: 12px;
  margin-top: 4px;
}
.pill.positive { background: #dff3fb; color: var(--gain); border: 1px solid #bfe7f2; }
.pill.negative { background: #ffedd5; color: var(--loss); border: 1px solid #fed7aa; }
.pill.buy { background: #dff3fb; color: var(--gain); border: 1px solid #bfe7f2; }
.pill.hold { background: #e7f8f2; color: #0b7c70; border: 1px solid #bceee2; }
.pill.risk { background: #ffedd5; color: var(--loss); border: 1px solid #fed7aa; }
.pill.neutral { background: var(--panel); color: var(--muted); border: 1px solid var(--line); }
.filter-chip {
  display: inline-flex; align-items: center; gap: 4px;
  border: 1px solid var(--line); background: #ffffff; color: var(--muted);
  border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; margin: 0 8px 10px 0;
}
.filter-chip:hover { border-color: var(--teal); }
.filter-chip.active { color: var(--text); border-color: rgba(15,159,143,.42); background: #dff7f2; }
.filter-chip.good.active { background: #dff3fb; color: var(--gain); border-color: #bfe7f2; }
.filter-chip.watch.active { background: #fff7ed; color: var(--warn); border-color: #fed7aa; }
.filter-chip.neutral.active { background: var(--panel2); color: var(--muted); border-color: var(--line); }
.search {
  width: min(260px, 100%);
  background: #ffffff;
  border: 1px solid var(--line);
  color: var(--text);
  border-radius: 999px;
  padding: 9px 13px;
  outline: none;
}
.search:focus { border-color: var(--teal); box-shadow: 0 0 0 4px rgba(15,159,143,.12); }
.cat { padding: 14px 16px; border-top: 1px solid var(--line); }
.cat:first-child { border-top: 0; }
.cat-title { color: var(--muted); font-size: 13px; margin-bottom: 10px; font-weight: 650; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  background: #f6fbfc;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}
footer { color: var(--subtle); font-size: 12px; padding-top: 8px; }
.expand-btn {
  border: 1px solid var(--line);
  background: #ffffff;
  color: var(--text);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  font-weight: 750;
}
.expand-btn:hover { border-color: var(--teal); color: var(--blue); background: #effbf8; }
.broker-detail-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
}
@media (max-width: 760px) {
  .app { padding: 10px 8px 42px; }
  header { display: block; padding: 16px 16px; border-radius: 20px; margin-bottom: 12px; }
  h1 { font-size: 24px; }
  .eyebrow { font-size: 10px; }
  .date { font-size: 12px; }
  .source { text-align: left; margin-top: 8px; font-size: 11px; padding: 6px 10px; }
  .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
  .metric { padding: 10px 12px; border-radius: 14px; }
  .metric .label { font-size: 11px; margin-bottom: 3px; }
  .metric .value { font-size: 17px; }
  .metric .hint { font-size: 10px; }
  .grid { grid-template-columns: 1fr; }
  .intel-grid { grid-template-columns: 1fr; padding: 10px 10px 12px; gap: 10px; }
  .overview-grid { grid-template-columns: 1fr; }
  .value { font-size: 20px; }
  section { margin-bottom: 12px; border-radius: 16px; }
  .section-head { align-items: flex-start; flex-direction: column; padding: 12px; gap: 6px; }
  h2 { font-size: 15px; }
  .section-actions { justify-content: flex-start; }
  .search { width: 100%; }
  .intel-summary { margin: 12px 12px 0; padding: 12px; }

  /* 表格在手机上改成一行一张卡片，不用再左右滑动看小字 */
  .table-wrap { overflow-x: visible; }
  table.stack-mobile thead { display: none; }
  table.stack-mobile, table.stack-mobile tbody, table.stack-mobile tr, table.stack-mobile td { display: block; width: 100%; min-width: 0; }
  table.stack-mobile tr { border: 1px solid var(--line); border-radius: 14px; padding: 10px 12px; margin: 0 0 10px; background: #fff; }
  table.stack-mobile tr.total-row, table.stack-mobile tr.sub { background: var(--panel2); }
  table.stack-mobile td { border-bottom: 0; text-align: left !important; padding: 3px 0; font-size: 13px; display: flex; justify-content: space-between; gap: 10px; }
  table.stack-mobile td::before { content: attr(data-label); color: var(--muted); font-family: var(--font-sans, inherit); font-weight: 600; font-size: 11px; flex-shrink: 0; }
  table.stack-mobile td:first-child::before { content: ""; }
  table.stack-mobile td:has(.bar), table.stack-mobile td:has(.level-axis) { display: block; }
  table.stack-mobile td:has(.bar)::before, table.stack-mobile td:has(.level-axis)::before { display: block; margin-bottom: 4px; }
  table.stack-mobile td .bar, table.stack-mobile td .level-axis { width: 100%; min-width: 0; }
}

function renderPortfolioHistory() {

  const pill = document.getElementById("history-range-pill");
  const body = document.getElementById("portfolio-history-body");
  if (history.length < 2) {
    pill.textContent = "";

    return;
  }
  const values = history.map(h => h.total_market_value);
  const chartW = 640, chartH = 160, padX = 4, padY = 16;
  const min = Math.min(...values), max = Math.max(...values);

  const stepX = history.length > 1 ? (chartW - padX * 2) / (history.length - 1) : 0;
  const points = history.map((pt, i) => {
    const x = padX + i * stepX;
    const y = padY + (chartH - padY * 2) * (1 - (pt.total_market_value - min) / range);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const rising = values[values.length - 1] >= values[0];
  const color = rising ? "var(--gain)" : "var(--loss)";
  const first = history[0], last = history[history.length - 1];
  pill.textContent = `${first.date} → ${last.date}`;
  body.innerHTML = `
    <svg viewBox="0 0 ${chartW} ${chartH}" style="width:100%;height:140px;display:block;" preserveAspectRatio="none">
      <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--subtle);margin-top:6px;">

  const events = REPORT.calendar_events || [];
  const body = document.getElementById("calendar-body");
  if (!events.length) { body.innerHTML = `<div class="cal-empty">近期没有已知的财报或宏观事件</div>`; return; }

  const eventsByDate = {};
  events.forEach(e => { (eventsByDate[e.sort_key] = eventsByDate[e.sort_key] || []).push(e); });

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const pad = n => String(n).padStart(2, "0");
  const toKey = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  const todayKey = toKey(today);

  const maxEventDate = events.reduce((max, e) => {
    const d = new Date(e.sort_key + "T00:00:00");
    return d > max ? d : max;
  }, today);

  const months = [];
  let cursor = new Date(today.getFullYear(), today.getMonth(), 1);
  const endMonth = new Date(maxEventDate.getFullYear(), maxEventDate.getMonth(), 1);
  while (cursor <= endMonth) {
    months.push(new Date(cursor));
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  }

  const weekdayLabels = ["一", "二", "三", "四", "五", "六", "日"];
  const monthBlocks = months.map(monthStart => {
    const year = monthStart.getFullYear();
    const month = monthStart.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstWeekday = (monthStart.getDay() + 6) % 7; // 0=周一 ... 6=周日
    const cells = [];
    for (let i = 0; i < firstWeekday; i++) cells.push(`<div class="cal-day empty"></div>`);
    for (let day = 1; day <= daysInMonth; day++) {
      const key = toKey(new Date(year, month, day));
      const dayEvents = eventsByDate[key] || [];
      const shown = dayEvents.slice(0, 2);
      const extra = dayEvents.length - shown.length;
      const tagsHtml = dayEvents.length ? `<div class="cal-day-tags">
        ${shown.map(e => `<span class="cal-day-tag ${e.type}">${e.type === "earnings" ? e.label.replace(" 财报发布", "") : "宏观"}</span>`).join("")}
        ${extra > 0 ? `<span class="cal-day-more">+${extra}</span>` : ""}
      </div>` : "";
      cells.push(`<div class="cal-day ${key === todayKey ? "today" : ""} ${dayEvents.length ? "has-event" : ""}" ${dayEvents.length ? `data-cal-date="${key}"` : ""}>
        <span class="cal-day-num">${day}</span>
        ${tagsHtml}
      </div>`);
    }
    return `<div class="cal-month">
      <div class="cal-month-title">${year}年${month + 1}月</div>
      <div class="cal-grid">
        ${weekdayLabels.map(w => `<div class="cal-weekday">${w}</div>`).join("")}
        ${cells.join("")}
      </div>
    </div>`;
  }).join("");

  const listHtml = events.map(e => `
    <div class="cal-item" data-date="${e.sort_key}">
      <div class="cal-date">${e.date}</div>
      <div><span class="cal-tag ${e.type}">${e.type === "earnings" ? "财报" : "宏观"}</span>${e.label}</div>
    </div>
  `).join("");

  body.innerHTML = `<div class="cal-months">${monthBlocks}</div>${listHtml}`;

  body.querySelectorAll("[data-cal-date]").forEach(cell => {
    cell.addEventListener("click", () => {
      const key = cell.dataset.calDate;
      const items = body.querySelectorAll(`.cal-item[data-date="${key}"]`);
      if (!items.length) return;
      items[0].scrollIntoView({ behavior: "smooth", block: "center" });
      items.forEach(item => {
        item.classList.add("highlight");
        setTimeout(() => item.classList.remove("highlight"), 1500);
      });
    });
  });
}
function render() {
  document.getElementById("date").textContent = REPORT.date_label;
  document.getElementById("source").textContent = `生成时间：${REPORT.generated_at}`;
  const p = REPORT.portfolio;
  const attr = REPORT.daily_attribution || {};
  const metricList = [
    { label: "总市值", value: `$${fmt(p.total_market_value)}`, hint: "", tone: "neutral" },
    { label: "总成本", value: `$${fmt(p.total_cost)}`, hint: "", tone: "neutral" },
    { label: "总浮盈亏", value: money(p.total_pnl), hint: pct(p.total_pnl_pct) + "（累计，非区间）", tone: cls(p.total_pnl) },
    { label: "持仓标的", value: String(p.position_count), hint: "跨平台合并", tone: "neutral" }
  ];
  if (attr.has_prior_snapshot) {
    metricList.splice(3, 0, { label: "今日盈亏", value: money(attr.total_daily_pnl), hint: `较${attr.prior_date}`, tone: cls(attr.total_daily_pnl) });
  }
  if (p.position_ratio_pct !== null && p.position_ratio_pct !== undefined) {
    metricList.push({ label: "已用仓位", value: `${fmt(p.position_ratio_pct)}%`, hint: `现金 $${fmt(p.available_cash)}`, tone: "neutral" });
  }
  document.getElementById("metrics").innerHTML = metricList.map(item => `<div class="metric"><div class="label">${item.label}</div><div class="value ${item.tone}">${item.value}</div><div class="hint">${item.hint}</div></div>`).join("");
  document.getElementById("position-count").textContent = `${p.position_count} 个标的`;
  renderAttribution();
  renderPortfolioHistory();
  renderCalendar();
  renderPositionTable();
  renderIntelligence();
  renderLevelsTable();
  renderCategories("");
  document.getElementById("search").addEventListener("input", e => renderCategories(e.target.value));
  document.getElementById("notes").innerHTML = REPORT.notes.map(n => `<div class="note">${n}</div>`).join("");
  document.getElementById("toggle-sources").addEventListener("click", () => {
    sourcesVisible = !sourcesVisible;
    renderSources();
  });
  renderSources();
}
function renderCategories(query) {
  const q = query.trim().toUpperCase();
  document.getElementById("categories").innerHTML = REPORT.categories.map(cat => {
    const items = cat.items.filter(x => !q || x.ticker.includes(q));
    if (!items.length) return "";
    return `<div class="cat"><div class="cat-title">${cat.name}</div><div class="chips">${items.map(item => `<span class="chip"><b>${item.ticker}</b><span>${fmt(item.last_price)}</span><span class="${cls(item.change_pct)}">${pct(item.change_pct)}</span></span>`).join("")}</div></div>`;
  }).join("") || `<div class="cat"><div class="note">没有匹配的代码</div></div>`;
}
// 放在脚本最末尾执行：保证上面所有函数/状态变量都已声明完毕，
// 避免"已解锁过、刷新页面自动进入"这条路径提前触发 render() 时踩到 TDZ 报错
if (sessionStorage.getItem("stock-monitor-unlocked") === PASSWORD_HASH) {
  unlock();
} else {
  document.getElementById("password").addEventListener("keydown", async (event) => {
    if (event.key !== "Enter") return;
    const hash = await sha256(event.target.value);
    if (hash === PASSWORD_HASH) {
      sessionStorage.setItem("stock-monitor-unlocked", hash);
      unlock();
    } else {
      document.getElementById("lock-error").textContent = "密码不对";
      event.target.value = "";
    }
  });
}
</script>
</body>
</html>
